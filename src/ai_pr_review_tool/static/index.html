<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI PR Review Tool</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --ink: #1f2937;
        --muted: #667085;
        --line: #d9dee7;
        --accent: #2563eb;
        --critical: #9f1239;
        --high: #b42318;
        --medium: #b54708;
        --low: #475467;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.15;
      }
      p {
        color: var(--muted);
        line-height: 1.55;
      }
      form,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 16px;
        margin-bottom: 20px;
      }
      input[type="url"] {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 12px;
        font-size: 15px;
      }
      .options {
        grid-column: 1 / -1;
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 14px;
      }
      button {
        border: 0;
        border-radius: 6px;
        padding: 0 18px;
        min-height: 44px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .panel {
        padding: 18px;
        margin-top: 16px;
      }
      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(120px, 1fr));
        gap: 12px;
      }
      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }
      .metric strong {
        display: block;
        font-size: 22px;
      }
      .metric span {
        color: var(--muted);
        font-size: 13px;
      }
      .finding {
        border-top: 1px solid var(--line);
        padding: 16px 0;
      }
      .finding:first-child {
        border-top: 0;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 3px 9px;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        margin-right: 8px;
      }
      .critical {
        background: var(--critical);
      }
      .high {
        background: var(--high);
      }
      .medium {
        background: var(--medium);
      }
      .low,
      .info {
        background: var(--low);
      }
      code {
        word-break: break-word;
      }
      .error {
        color: #b42318;
        font-weight: 700;
      }
      @media (max-width: 760px) {
        header,
        form {
          display: block;
        }
        button {
          width: 100%;
          margin-top: 12px;
        }
        .summary {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>AI PR Review Tool</h1>
          <p>Fetch a GitHub Pull Request, summarize the diff, rank risky changes, and generate review suggestions.</p>
        </div>
      </header>

      <form id="review-form">
        <input
          id="pr-url"
          type="url"
          placeholder="https://github.com/owner/repo/pull/123"
          required
        />
        <button id="submit" type="submit">Review PR</button>
        <div class="options">
          <label><input id="use-ai" type="checkbox" checked /> Use AI when configured</label>
          <label><input id="post-comment" type="checkbox" /> Post PR comment</label>
        </div>
      </form>

      <section id="result"></section>
    </main>

    <script>
      const form = document.querySelector("#review-form");
      const result = document.querySelector("#result");
      const submit = document.querySelector("#submit");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submit.disabled = true;
        result.innerHTML = '<div class="panel">Analyzing Pull Request...</div>';

        const payload = {
          pr_url: document.querySelector("#pr-url").value,
          use_ai: document.querySelector("#use-ai").checked,
          post_comment: document.querySelector("#post-comment").checked,
        };

        try {
          const response = await fetch("/reviews", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "Review failed");
          }
          renderReport(data.report, data.comment_url);
        } catch (error) {
          result.innerHTML = `<div class="panel error">${escapeHtml(error.message)}</div>`;
        } finally {
          submit.disabled = false;
        }
      });

      function renderReport(report, commentUrl) {
        const summary = report.summary;
        const findings = report.findings || [];
        result.innerHTML = `
          <section class="panel">
            <h2>${escapeHtml(summary.headline)}</h2>
            ${commentUrl ? `<p>Posted PR comment: <a href="${commentUrl}">${commentUrl}</a></p>` : ""}
            <div class="summary">
              <div class="metric"><strong>${summary.changed_files}</strong><span>Files</span></div>
              <div class="metric"><strong>+${summary.additions}</strong><span>Additions</span></div>
              <div class="metric"><strong>-${summary.deletions}</strong><span>Deletions</span></div>
              <div class="metric"><strong>${summary.risk_level}</strong><span>Risk</span></div>
            </div>
            <ul>${summary.bullets.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </section>
          <section class="panel">
            <h2>Review Suggestions</h2>
            ${
              findings.length
                ? findings.map(renderFinding).join("")
                : "<p>No actionable findings detected. Please still perform normal human review.</p>"
            }
          </section>
        `;
      }

      function renderFinding(finding) {
        const location = finding.file_path
          ? `${finding.file_path}${finding.line ? `:${finding.line}` : ""}`
          : "PR level";
        return `
          <article class="finding">
            <h3><span class="badge ${finding.severity}">${finding.severity}</span>${escapeHtml(finding.title)}</h3>
            <p><strong>${escapeHtml(location)}</strong> · ${escapeHtml(finding.category)} · confidence ${Number(finding.confidence).toFixed(2)}</p>
            <p>${escapeHtml(finding.body)}</p>
            <p><strong>Recommendation:</strong> ${escapeHtml(finding.recommendation)}</p>
            ${finding.evidence ? `<p><code>${escapeHtml(finding.evidence)}</code></p>` : ""}
          </article>
        `;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          }[char];
        });
      }
    </script>
  </body>
</html>
